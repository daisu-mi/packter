<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>PACKTER 3.0</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  #view { width: 100%; height: 100%; display: block; }
  #hud {
    position: fixed; top: 10px; left: 10px; color: #cfe8ff;
    font-family: Consolas, monospace; font-size: 13px; line-height: 1.6;
    background: rgba(0,0,0,0.45); padding: 8px 12px; border-radius: 6px;
    user-select: none; pointer-events: none;
  }
  #selinfo {
    position: fixed; bottom: 70px; left: 10px; max-width: 60vw;
    color: #ffe9a8; font-family: Consolas, monospace; font-size: 13px;
    background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 6px;
    display: none; white-space: pre-wrap; word-break: break-all;
  }
  #toast {
    position: fixed; top: 16px; right: 16px; width: min(420px, 40vw);
    display: flex; flex-direction: column; gap: 10px; z-index: 10;
  }
  .toastcard {
    background: rgba(10, 20, 35, 0.92); border: 1px solid #3a6ea5;
    border-radius: 8px; padding: 10px; color: #e8f2ff;
    font-family: sans-serif; font-size: 13px; display: flex; gap: 10px;
    align-items: flex-start; animation: slidein 0.25s ease-out;
  }
  .toastcard img { max-width: 96px; max-height: 96px; border-radius: 4px; }
  .toastcard iframe {
    border: 0; background: #fff; border-radius: 4px; width: 100%; height: 110px;
  }
  @keyframes slidein { from { transform: translateX(20px); opacity: 0; } }
  #timebar {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    width: min(720px, 80vw); display: flex; gap: 10px; align-items: center;
    background: rgba(0,0,0,0.45); padding: 8px 14px; border-radius: 8px;
    font-family: Consolas, monospace; font-size: 12px; color: #cfe8ff;
  }
  #timebar input[type=range] { flex: 1; }
  #timebar button {
    background: #1b3a5b; color: #cfe8ff; border: 1px solid #3a6ea5;
    border-radius: 4px; padding: 2px 10px; font-family: inherit; cursor: pointer;
  }
  #timebar button.active { background: #3a6ea5; }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="hud">PACKTER 3.0 beta — connecting...</div>
<div id="selinfo"></div>
<div id="toast"></div>
<div id="timebar">
  <button id="btnPause" title="S">⏸ 停止</button>
  <button id="btnLive" title="C">⏩ LIVE</button>
  <input id="seek" type="range" min="0" max="1000" value="1000" step="1">
  <span id="timeLabel">live</span>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
