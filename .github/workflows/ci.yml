name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  broker:
    name: broker (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        working-directory: broker
        run: cargo test --verbose

  agent-linux:
    name: agent (ubuntu, --with-geoip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libmaxminddb-dev autoconf automake
      - name: build + test
        working-directory: agent
        run: |
          sh autogen.sh
          ./configure --with-geoip
          make
          make check

  agent-macos:
    name: agent (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: install autotools
        run: brew install autoconf automake
      - name: build + test
        working-directory: agent
        run: |
          sh autogen.sh
          ./configure
          make
          make check

  agent-freebsd:
    name: agent (freebsd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build + test on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y autoconf automake gmake python3
          run: |
            cd agent
            sh autogen.sh
            ./configure
            gmake
            gmake check
